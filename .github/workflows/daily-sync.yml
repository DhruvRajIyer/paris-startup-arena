name: Daily Job Sync

on:
  schedule:
    - cron: '0 4 * * *'    # 06:00 Paris time (UTC+2 = 04:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily sync
        run: npx tsx scripts/sync.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ Daily sync failed. Check the logs above."
          # Optional: Add Discord/Slack webhook notification here
          # curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"content":"⚠️ Paris Startup Arena daily sync FAILED. Check GitHub Actions."}'
