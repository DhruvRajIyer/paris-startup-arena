<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo.dev API Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 { color: #C8A96E; }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .logo-card {
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .logo-card img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin: 10px 0;
            background: #333;
            border-radius: 8px;
            padding: 8px;
        }
        .logo-card h3 {
            font-size: 14px;
            margin: 10px 0 5px;
            color: #C8A96E;
        }
        .logo-card .domain {
            font-size: 12px;
            color: #888;
            margin: 5px 0;
        }
        .logo-card .status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 10px;
            display: inline-block;
        }
        .status.success { background: #10B981; color: #000; }
        .status.error { background: #EF4444; color: #fff; }
        .status.loading { background: #F59E0B; color: #000; }
        .config {
            background: #2a2a2a;
            border: 2px solid #C8A96E;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .config code {
            background: #1a1a1a;
            padding: 2px 6px;
            border-radius: 4px;
            color: #60A5FA;
        }
        .config pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            color: #34D399;
        }
    </style>
</head>
<body>
    <h1>🎨 Logo.dev API Configuration Test</h1>
    
    <div class="config">
        <h2>Configuration</h2>
        <p><strong>API Key:</strong> <code id="api-key">pk_SMnGLSXhRs255MA69qlnyg</code></p>
        <p><strong>Endpoint:</strong> <code>https://img.logo.dev/{domain}</code></p>
        <p><strong>Parameters:</strong></p>
        <pre id="params">token: pk_SMnGLSXhRs255MA69qlnyg
size: 64
format: webp
theme: dark
quality: 80
retina: true</pre>
    </div>

    <h2>Testing Company Logos</h2>
    <div class="test-grid" id="logo-grid"></div>

    <script>
        const API_KEY = 'pk_SMnGLSXhRs255MA69qlnyg';
        
        const testCompanies = [
            { name: 'Dataiku', domain: 'dataiku.com' },
            { name: 'Doctolib', domain: 'doctolib.com' },
            { name: 'Qonto', domain: 'qonto.com' },
            { name: 'Photoroom', domain: 'photoroom.com' },
            { name: 'Alan', domain: 'alan.com' },
            { name: 'Mistral AI', domain: 'mistral.ai' },
            { name: 'Stripe', domain: 'stripe.com' },
            { name: 'Google', domain: 'google.com' },
        ];

        function buildLogoUrl(domain) {
            const params = new URLSearchParams({
                token: API_KEY,
                size: '64',
                format: 'webp',
                theme: 'dark',
                quality: '80',
                retina: 'true'
            });
            return `https://img.logo.dev/${domain}?${params.toString()}`;
        }

        function createLogoCard(company) {
            const card = document.createElement('div');
            card.className = 'logo-card';
            
            const logoUrl = buildLogoUrl(company.domain);
            
            card.innerHTML = `
                <h3>${company.name}</h3>
                <div class="domain">${company.domain}</div>
                <img src="${logoUrl}" alt="${company.name} logo" id="logo-${company.domain}">
                <div class="status loading" id="status-${company.domain}">Loading...</div>
            `;
            
            const img = card.querySelector('img');
            const status = card.querySelector('.status');
            
            img.onload = () => {
                status.textContent = '✓ Loaded';
                status.className = 'status success';
                console.log(`✅ ${company.name} logo loaded successfully`);
            };
            
            img.onerror = () => {
                status.textContent = '✗ Failed';
                status.className = 'status error';
                console.error(`❌ ${company.name} logo failed to load`);
                console.error(`URL: ${logoUrl}`);
            };
            
            return card;
        }

        // Load all logos
        const grid = document.getElementById('logo-grid');
        testCompanies.forEach(company => {
            grid.appendChild(createLogoCard(company));
        });

        // Log configuration
        console.log('🔧 Logo.dev Configuration:');
        console.log('API Key:', API_KEY);
        console.log('Test Companies:', testCompanies.length);
        console.log('\n📋 Example URL:');
        console.log(buildLogoUrl('dataiku.com'));
    </script>
</body>
</html>
